<div class="login-page">
    <div class="login-container">
        <div class="logo">
            <img src="/src/assets/images/logo.svg" alt="Logo" width="80">
            <h2>Registro de Usuario</h2>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Juan" required>
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" class="form-control" placeholder="Pérez" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="juan@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                <small>Debe contener mayúscula, minúscula y número</small>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
        
        <div class="register-link">
            ¿Ya tienes cuenta? <a href="#" onclick="app.navigateTo('login')">Inicia sesión aquí</a>
        </div>
        
        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>
    </div>
</div>
