<div class="dashboard">
    <h1>Dashboard</h1>
    <p class="welcome-message">Bienvenido, <span id="userName"></span></p>
    
    <div id="alertContainer"></div>
    
    <div class="status-indicator">
        <span id="connectionStatus" class="status-online">✅ Conectado</span>
        <span id="syncStatus" class="sync-status"></span>
    </div>
    
    <!-- Estadísticas -->
    <div id="statsContainer" class="stats-grid">
        <!-- Cargado dinámicamente -->
    </div>
    
    <div class="dashboard-grid">
        <!-- Productos bajo stock -->
        <div class="card">
            <div class="card-title">📦 Productos con Stock Bajo</div>
            <div id="lowStockContainer">
                <!-- Cargado dinámicamente -->
            </div>
        </div>
        
        <!-- Ventas recientes -->
        <div class="card">
            <div class="card-title">🛒 Ventas Recientes</div>
            <div id="recentSalesContainer">
                <!-- Cargado dinámicamente -->
            </div>
        </div>
    </div>
</div>
