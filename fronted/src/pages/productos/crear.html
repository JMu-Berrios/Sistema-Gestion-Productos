<div class="page-header">
    <h1>➕ Nuevo Producto</h1>
    <button class="btn btn-outline" onclick="app.navigateTo('productos')">← Volver</button>
</div>

<div id="alertContainer"></div>

<div class="card">
    <form id="formProducto">
        <div class="form-row">
            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" class="form-control" placeholder="Nombre del producto" required>
            </div>
            
            <div class="form-group">
                <label for="codigo">Código *</label>
                <input type="text" id="codigo" class="form-control" placeholder="PRD001" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" class="form-control" rows="3" placeholder="Descripción del producto"></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="precio">Precio *</label>
                <input type="number" id="precio" class="form-control" placeholder="99.99" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="stock">Stock *</label>
                <input type="number" id="stock" class="form-control" placeholder="100" required>
            </div>
            
            <div class="form-group">
                <label for="categoriaId">Categoría *</label>
                <select id="categoriaId" class="form-control" required>
                    <option value="">Seleccionar categoría</option>
                </select>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Guardar Producto</button>
    </form>
</div>
