<div class="page-header">
    <h1>🏷️ Categorías</h1>
    <button class="btn btn-primary" onclick="abrirModalCategoria()">
        + Nueva Categoría
    </button>
</div>

<div id="alertContainer"></div>

<div class="card">
    <div class="card-title">Lista de Categorías</div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Productos</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCategoriasBody">
                <!-- Cargado dinámicamente -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal para crear/editar categoría -->
<div id="modalCategoria" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalCategoriaTitle">Nueva Categoría</h2>
            <button class="close-btn" onclick="cerrarModalCategoria()">&times;</button>
        </div>
        <form id="formCategoria">
            <input type="hidden" id="categoriaId" value="">
            <div class="form-group">
                <label for="categoriaNombre">Nombre *</label>
                <input type="text" id="categoriaNombre" class="form-control" placeholder="Nombre de la categoría" required>
            </div>
            <div class="form-group">
                <label for="categoriaDescripcion">Descripción</label>
                <textarea id="categoriaDescripcion" class="form-control" rows="3" placeholder="Descripción de la categoría"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
